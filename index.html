<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | Cinematic Discoveries</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-brand">
            <div class="brand-title">
                <img src="Assets/logo.png" alt="Vault Logo" class="brand-logo">
                <h1>Vault.</h1>
            </div>
            <p>Discover films, add favorites, and keep your watchlist close.</p>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button">Toggle Theme</button>
        </div>
        <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="Search for movies, series..." required>
            <button id="search-btn" type="submit">Search</button>
        </form>
        <div class="controls">
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="movie">Movie</option>
                <option value="series">Series</option>
                <option value="episode">Episode</option>
            </select>
            <select id="sort-by">
                <option value="">Sort by</option>
                <option value="year-asc">Year ↑</option>
                <option value="year-desc">Year ↓</option>
                <option value="title-asc">Title A–Z</option>
                <option value="title-desc">Title Z–A</option>
            </select>
        </div>
    </header>

    <main>
        <div class="content-grid">
            <section class="home-panel">
                <div id="loading" class="hidden">Fetching movies from the vault...</div>
                <div id="message" class="hidden"></div>
                <div class="panel-header">
                    <h2>Recommended Movies</h2>
                    <button id="load-more-btn" class="load-more hidden" type="button">Load More</button>
                </div>
                <div id="movies-container" class="grid-container"></div>
            </section>

            <aside id="watchlist" class="watchlist-panel">
                <div class="watchlist-header">
                    <h2>Your Watchlist</h2>
                    <p>Keep track of films you want to watch next.</p>
                </div>
                <div id="watchlist-container" class="watchlist-container"></div>
            </aside>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
